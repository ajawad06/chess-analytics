<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chess Analytics - Settings</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap");

      :root {
        --bg: #12141a;
        --bg2: #1a1d27;
        --bg3: #202431;
        --bg4: #252a3a;
        --bg5: #2c3245;
        --border: #2a3048;
        --border2: #36406a;
        --gold: #f0b94a;
        --gold2: #ffd97a;
        --gold-dim: #7a5c1e;
        --gold-bg: rgba(240, 185, 74, 0.08);
        --text: #eef0f8;
        --text2: #a8b0cc;
        --text3: #5a6380;
        --green: #4ec98a;
        --red: #f05a5a;
        --white-sq: #f0d9b5;
        --black-sq: #b58863;
        --radius: 8px;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body {
        height: 100%;
        overflow: hidden;
      }
      body {
        font-family: "Inter", sans-serif;
        background: var(--bg);
        color: var(--text);
        display: flex;
        flex-direction: column;
      }

      #titlebar {
        display: flex;
        align-items: center;
        height: 44px;
        background: var(--bg2);
        border-bottom: 1px solid var(--border);
        padding-left: 20px;
        -webkit-app-region: drag;
        flex-shrink: 0;
      }
      .tb-logo {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-right: 20px;
      }
      .tb-icon {
        width: 20px;
        text-align: center;
        color: var(--gold);
        font-size: 18px;
      }
      .tb-brand {
        display: flex;
        flex-direction: column;
      }
      .tb-name {
        font-family: "Cinzel", serif;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.16em;
        color: var(--gold);
        text-transform: uppercase;
        line-height: 1;
      }
      .tb-sub {
        font-family: "JetBrains Mono", monospace;
        font-size: 9px;
        color: var(--text3);
        letter-spacing: 0.08em;
        margin-top: 2px;
      }
      .tb-nav {
        display: flex;
        align-items: stretch;
        height: 44px;
        -webkit-app-region: no-drag;
      }
      .nav-tab {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 0 18px;
        font-family: "JetBrains Mono", monospace;
        font-size: 10px;
        letter-spacing: 0.08em;
        color: var(--text3);
        border: none;
        background: none;
        cursor: pointer;
        border-bottom: 2px solid transparent;
        transition: color 0.15s, background 0.15s, border-color 0.15s;
        text-transform: uppercase;
      }
      .nav-tab:hover {
        color: var(--text2);
        background: rgba(255, 255, 255, 0.03);
      }
      .nav-tab.active {
        color: var(--gold);
        border-bottom-color: var(--gold);
        background: var(--gold-bg);
      }
      .tb-status {
        flex: 1;
        -webkit-app-region: drag;
      }
      .tb-win {
        display: flex;
        height: 44px;
        -webkit-app-region: no-drag;
      }
      .win-btn {
        width: 46px;
        height: 44px;
        border: none;
        background: transparent;
        color: var(--text3);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
      }
      .win-btn:hover {
        background: var(--bg4);
        color: var(--text2);
      }
      .win-btn.close:hover {
        background: #c0392b;
        color: #fff;
      }
      .win-btn svg {
        width: 10px;
        height: 10px;
      }

      #app {
        flex: 1;
        overflow-y: auto;
        padding: 24px;
      }
      .settings-shell {
        max-width: 1040px;
        margin: 0 auto;
      }
      .page-head {
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        gap: 18px;
        margin-bottom: 18px;
      }
      .page-title {
        font-family: "Cinzel", serif;
        color: var(--gold2);
        letter-spacing: 0.12em;
        text-transform: uppercase;
        font-size: 18px;
      }
      .page-sub {
        color: var(--text3);
        font-size: 12px;
        margin-top: 6px;
      }
      .btn {
        border: 1px solid var(--border2);
        background: var(--bg3);
        color: var(--text2);
        font-family: "JetBrains Mono", monospace;
        font-size: 10px;
        border-radius: var(--radius);
        padding: 8px 11px;
        cursor: pointer;
      }
      .btn:hover {
        border-color: var(--gold);
        color: var(--gold);
      }
      .grid {
        display: grid;
        grid-template-columns: minmax(0, 1.2fr) minmax(310px, 0.8fr);
        gap: 16px;
      }
      .panel {
        background: var(--bg2);
        border: 1px solid var(--border);
        border-radius: 10px;
        overflow: hidden;
      }
      .panel-head {
        background: var(--bg3);
        border-bottom: 1px solid var(--border);
        padding: 12px 14px;
      }
      .panel-title {
        font-family: "Cinzel", serif;
        color: var(--gold2);
        font-size: 11px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }
      .panel-body {
        padding: 14px;
      }
      .option-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
      }
      .choice {
        border: 1px solid var(--border);
        background: var(--bg3);
        border-radius: 8px;
        padding: 12px;
        cursor: pointer;
        min-height: 98px;
      }
      .choice:hover {
        border-color: var(--border2);
      }
      .choice.selected {
        border-color: var(--gold);
        box-shadow: inset 0 0 0 1px var(--gold-dim);
      }
      .choice-title {
        font-family: "JetBrains Mono", monospace;
        color: var(--text);
        font-size: 12px;
        margin-bottom: 8px;
      }
      .swatches {
        display: flex;
        gap: 6px;
      }
      .swatch {
        width: 24px;
        height: 24px;
        border-radius: 50%;
        border: 1px solid rgba(255, 255, 255, 0.15);
      }
      .prefs {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .pref-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
        padding: 12px;
        border: 1px solid var(--border);
        background: var(--bg3);
        border-radius: 8px;
      }
      .pref-name {
        color: var(--text);
        font-size: 13px;
      }
      .pref-desc {
        color: var(--text3);
        font-size: 11px;
        margin-top: 3px;
      }
      .toggle {
        width: 44px;
        height: 24px;
        border: 1px solid var(--border2);
        border-radius: 20px;
        background: var(--bg4);
        padding: 2px;
        cursor: pointer;
        flex-shrink: 0;
      }
      .toggle span {
        display: block;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: var(--text3);
        transition: transform 0.15s, background 0.15s;
      }
      .toggle.on {
        border-color: var(--gold);
      }
      .toggle.on span {
        transform: translateX(18px);
        background: var(--gold);
      }
      .board-preview {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        width: 108px;
        aspect-ratio: 1;
        border-radius: 7px;
        overflow: hidden;
        border: 1px solid var(--border2);
      }
      .board-preview span:nth-child(odd) {
        background: var(--white-sq);
      }
      .board-preview span:nth-child(even) {
        background: var(--black-sq);
      }
      .saved {
        color: var(--green);
        font-family: "JetBrains Mono", monospace;
        font-size: 10px;
        opacity: 0;
        transition: opacity 0.18s;
      }
      .saved.show {
        opacity: 1;
      }
      @media (max-width: 900px) {
        .grid,
        .option-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
    <link rel="stylesheet" href="./theme.css" />
    <script defer src="./settings.js"></script>
  </head>
  <body>
    <div id="titlebar">
      <div class="tb-logo">
        <span class="tb-icon">⚙</span>
        <div class="tb-brand">
          <div class="tb-name">Chess Analytics</div>
          <div class="tb-sub">Settings</div>
        </div>
      </div>

      <div class="tb-nav">
        <button class="nav-tab" onclick="window.api?.goExplorer()">⚔ Query</button>
        <button class="nav-tab" onclick="window.api?.goAnalytics()">↗ Statistics</button>
        <button class="nav-tab" onclick="window.api?.goOpening()">♞ Explorer</button>
        <button class="nav-tab" onclick="window.api?.goOlap()">OLAP</button>
        <button class="nav-tab active">⚙ Settings</button>
      </div>

      <div class="tb-status"></div>
      <div class="tb-win">
        <button class="win-btn" onclick="window.api?.minimize()" title="Minimize">
          <svg viewBox="0 0 10 1" fill="none"><rect width="10" height="1" fill="currentColor" /></svg>
        </button>
        <button class="win-btn" onclick="window.api?.maximize()" title="Maximize">
          <svg viewBox="0 0 10 10" fill="none"><rect x="0.5" y="0.5" width="9" height="9" rx="1" stroke="currentColor" /></svg>
        </button>
        <button class="win-btn close" onclick="window.api?.close()" title="Close">
          <svg viewBox="0 0 10 10" fill="none">
            <line x1="1" y1="1" x2="9" y2="9" stroke="currentColor" stroke-width="1.2" />
            <line x1="9" y1="1" x2="1" y2="9" stroke="currentColor" stroke-width="1.2" />
          </svg>
        </button>
      </div>
    </div>

    <main id="app">
      <div class="settings-shell">
        <div class="page-head">
          <div>
            <h1 class="page-title">Preferences</h1>
            <p class="page-sub">Choose the atmosphere for long analysis sessions.</p>
          </div>
          <div style="display:flex;align-items:center;gap:12px;">
            <span class="saved" id="saved">Saved</span>
            <button class="btn" id="reset-btn">Reset Defaults</button>
          </div>
        </div>

        <div class="grid">
          <section class="panel">
            <div class="panel-head"><div class="panel-title">Theme</div></div>
            <div class="panel-body">
              <div class="option-grid" id="theme-options"></div>
            </div>
          </section>

          <section class="panel">
            <div class="panel-head"><div class="panel-title">Board</div></div>
            <div class="panel-body">
              <div class="option-grid" id="board-options"></div>
            </div>
          </section>

          <section class="panel" style="grid-column:1 / -1;">
            <div class="panel-head"><div class="panel-title">Small Preferences</div></div>
            <div class="panel-body">
              <div class="prefs" id="pref-options"></div>
            </div>
          </section>
        </div>
      </div>
    </main>

    <script>
      const THEME_CHOICES = [
        ["classic", "Ember Classic", ["#100f14", "#d6a95f", "#74c69d"]],
        ["midnight", "Nocturne", ["#0d1110", "#b7c06f", "#7ccf9b"]],
        ["lichess", "Lichess Slate", ["#111111", "#c9a86a", "#83b35d"]],
      ];

      const BOARD_CHOICES = [
        ["wood", "Wood", ["#f0d9b5", "#b58863"]],
        ["slate", "Slate", ["#d9e1e8", "#64748b"]],
        ["green", "Tournament", ["#e8ecd3", "#779954"]],
      ];

      const PREF_CHOICES = [
        ["compact", "Compact layout", "Tightens spacing in dense panels."],
        ["motion", "Piece animation", "Keeps board movement and UI transitions on."],
        ["rememberExplorer", "Remember explorer line", "Restores the last explored move sequence."],
      ];

      let prefs = null;
      let savedTimer = null;

      function save(next) {
        prefs = window.AppSettings.write({ ...prefs, ...next });
        render();
        const saved = document.getElementById("saved");
        saved.classList.add("show");
        clearTimeout(savedTimer);
        savedTimer = setTimeout(() => saved.classList.remove("show"), 1200);
      }

      function choiceButton([id, label, colors], type) {
        const selected = prefs[type] === id ? " selected" : "";
        const colorDots = colors
          .map((color) => `<span class="swatch" style="background:${color}"></span>`)
          .join("");
        return `<button class="choice${selected}" data-type="${type}" data-id="${id}">
          <div class="choice-title">${label}</div>
          <div class="swatches">${colorDots}</div>
        </button>`;
      }

      function render() {
        document.getElementById("theme-options").innerHTML = THEME_CHOICES
          .map((choice) => choiceButton(choice, "theme"))
          .join("");

        document.getElementById("board-options").innerHTML = BOARD_CHOICES
          .map((choice) => choiceButton(choice, "board"))
          .join("");

        document.getElementById("pref-options").innerHTML = PREF_CHOICES
          .map(([id, title, desc]) => {
            const on = !!prefs[id];
            return `<div class="pref-row">
              <div>
                <div class="pref-name">${title}</div>
                <div class="pref-desc">${desc}</div>
              </div>
              <button class="toggle${on ? " on" : ""}" data-pref="${id}" aria-label="${title}">
                <span></span>
              </button>
            </div>`;
          })
          .join("");

        document.querySelectorAll(".choice").forEach((btn) => {
          btn.onclick = () => save({ [btn.dataset.type]: btn.dataset.id });
        });
        document.querySelectorAll(".toggle").forEach((btn) => {
          btn.onclick = () => save({ [btn.dataset.pref]: !prefs[btn.dataset.pref] });
        });
      }

      window.addEventListener("DOMContentLoaded", () => {
        prefs = window.AppSettings.read();
        render();
        document.getElementById("reset-btn").onclick = () => {
          prefs = window.AppSettings.reset();
          render();
        };
      });
    </script>
  </body>
</html>
